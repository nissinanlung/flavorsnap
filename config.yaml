api:
  title: FlavorSnap REST API
  version: 1.0.0
  prefix: /api/v1
  max_upload_size_mb: 10
  allowed_mime_types:
    - image/jpeg
    - image/png
    - image/webp
  default_preprocessing:
    resize: 224
    center_crop: true
    normalize: true
    top_k: 3
  rate_limit:
    requests: 30
    window_seconds: 60
    exempt_paths:
      - /docs
      - /redoc
      - /openapi.json
      - /health
  cors:
    allow_origins:
      - "*"
    allow_methods:
      - "*"
    allow_headers:
      - "*"
model:
  path: models/best_model.pth
  classes_path: food_classes.txt
